<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MK Find</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar glass">
        <div class="brand">
          <div class="logo-dot"></div>
          <h1>MK Find</h1>
        </div>
        <button id="notifyBtn" class="icon-btn" type="button" aria-label="Notifications">
          <span class="icon">🔔</span>
        </button>
      </header>

      <section class="controls glass">
        <div class="chip-row">
          <button class="chip active" data-type="all" type="button">All</button>
          <button class="chip" data-type="item" type="button">Items</button>
          <button class="chip" data-type="pet" type="button">Pets</button>
          <button class="chip" data-type="person" type="button">People</button>
        </div>
        <div class="radius-wrap">
          <label for="radius">Radius</label>
          <input id="radius" type="range" min="1" max="30" value="8" />
          <output id="radiusValue" for="radius">8 km</output>
        </div>
      </section>

      <section class="content">
        <div id="map" class="card map"></div>
        <aside class="card list-panel">
          <div class="list-head">
            <h2>Near</h2>
            <button id="refreshBtn" class="icon-btn ghost" type="button" aria-label="Refresh">
              <span class="icon">↻</span>
            </button>
          </div>
          <ul id="results" class="results"></ul>
        </aside>
      </section>

      <div class="fab-stack">
        <button id="centerBtn" class="fab fab-ghost" type="button" aria-label="Locate">
          ◎
        </button>
        <button id="addBtn" class="fab" type="button" aria-label="Add listing">
          +
        </button>
      </div>
    </main>

    <section id="composeModal" class="compose-modal hidden" aria-hidden="true">
      <div id="modalBackdrop" class="compose-backdrop"></div>
      <form id="composeForm" class="compose-card" novalidate>
        <div class="compose-head">
          <h3>New</h3>
          <button id="closeComposeBtn" class="icon-btn ghost" type="button" aria-label="Close">✕</button>
        </div>

        <div class="compose-grid">
          <div class="field-row">
            <button class="chip kind-chip active" data-kind="item" type="button">Item</button>
            <button class="chip kind-chip" data-kind="pet" type="button">Pet</button>
            <button class="chip kind-chip" data-kind="person" type="button">Person</button>
          </div>

          <input id="titleInput" class="field-input" type="text" maxlength="90" placeholder="Title" required />
          <input id="detailInput" class="field-input" type="text" maxlength="180" placeholder="Details" />

          <label class="field-label" for="lastSeenInput">Last seen</label>
          <div class="field-row tight">
            <input id="lastSeenInput" class="field-input" type="datetime-local" />
            <label class="media-upload" for="mediaInput">Media</label>
            <input id="mediaInput" type="file" accept="image/*,video/*" multiple hidden />
          </div>

          <div id="mediaPreview" class="media-preview"></div>

          <label class="field-label" for="addressInput">Where last seen</label>
          <div class="field-row tight">
            <input id="addressInput" class="field-input" type="text" placeholder="Address" />
            <button id="findAddressBtn" class="chip" type="button">Find</button>
          </div>

          <div id="pickerMap" class="picker-map"></div>
          <p id="pickedMeta" class="picked-meta">Tap map to set last seen</p>
        </div>

        <button id="saveComposeBtn" class="save-btn" type="submit">Save</button>
      </form>
    </section>
    <section id="galleryModal" class="gallery-modal hidden" aria-hidden="true">
      <div id="galleryBackdrop" class="gallery-backdrop"></div>
      <div class="gallery-shell">
        <button id="galleryCloseBtn" class="icon-btn gallery-close" type="button" aria-label="Close">✕</button>
        <button id="galleryPrevBtn" class="gallery-nav gallery-prev" type="button" aria-label="Previous">‹</button>
        <div id="galleryStage" class="gallery-stage"></div>
        <button id="galleryNextBtn" class="gallery-nav gallery-next" type="button" aria-label="Next">›</button>
        <div id="galleryCount" class="gallery-count">1 / 1</div>
      </div>
    </section>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
